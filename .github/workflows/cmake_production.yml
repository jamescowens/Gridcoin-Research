name: CMake Production Builds (Depends)

on:
  push:
    # Run on push to ANY branch (includes forks if actions are enabled)
    branches:
      - '**'
    # AND run on release tags (triggers the deploy job)
    tags:
      - "v*"
      - "5.*"
  pull_request:
    # Run on any PR targeting any branch
    branches:
      - '**'

env:
  # Global settings for all jobs
  BUILD_TYPE: Release
  USE_CCACHE: true

jobs:
  # ----------------------------------------------------------------------
  # JOB 1: Depends Builds (Linux Static & Windows Cross - build_targets.sh
  #        targets 2 and 3)
  # ----------------------------------------------------------------------
  depends-builds:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux Static (Depends)
            host: x86_64-pc-linux-gnu
            build_dir: build_linux_depends
            # Pass specific flags for static linux build
            cmake_args: >
              -DSTATIC_LIBS=ON
              -DCMAKE_CXX_FLAGS="-fPIE"
              -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-Bdynamic"

          - name: Windows Cross-Compile
            host: x86_64-w64-mingw32
            build_dir: build_win64
            # Pass specific flags for Windows cross build
            cmake_args: >
              -DSYSTEM_XXD=ON
              -DCMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/wine
              -DCMAKE_EXE_LINKER_FLAGS="-static"

    steps:
      - uses: actions/checkout@v4

      # 1. Install Host Tools
      - name: Install System Dependencies
        run: |
          # Source the script to load the 'install_deps' function
          source ./install_dependencies.sh
          # Call the function explicitly (Qt6=false because we build it in depends)
          install_deps all false

          # Ensure wine is installed for Windows testing
          if [[ "${{ matrix.host }}" == *"mingw"* ]]; then
             sudo dpkg --add-architecture i386
             sudo apt-get update
             sudo apt-get install -y wine-stable wine64 wine32
          fi

      # 2. Cache Depends
      - name: Cache Depends
        id: cache-depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/work
            depends/${{ matrix.host }}
            depends/sdk-sources
          # Cache key based on host + hash of package definitions
          key: depends-${{ matrix.host }}-${{ hashFiles('depends/packages/*', 'depends/Makefile', 'depends/qt.include') }}

      # 3. Build Depends (Only if cache miss)
      - name: Build Depends
        if: steps.cache-depends.outputs.cache-hit != 'true'
        run: |
          cd depends
          make HOST=${{ matrix.host }} -j$(nproc)

      # 4. Configure CMake
      - name: Configure CMake
        run: |
          # Point to the toolchain generated by the depends system
          TOOLCHAIN_PATH=$(pwd)/depends/${{ matrix.host }}/toolchain.cmake

          # Define DEP_LIB explicitly so the CMake "Manual Fix" logic triggers for Linux Static
          DEP_LIB_PATH=$(pwd)/depends/${{ matrix.host }}/lib

          # Handle Qt6 Cross-Compilation (Windows)
          # We must use the 'native' tools built by depends, because we strictly
          # avoided installing System Qt6 in the CI environment (install_deps all false).
          HOST_TOOLS_DIR="depends/${{ matrix.host }}/native"

          if [ -d "$HOST_TOOLS_DIR" ]; then
             QT_HOST_PATH="$(pwd)/$HOST_TOOLS_DIR"
             QT_HOST_PATH_CMAKE_DIR="${QT_HOST_PATH}/lib/cmake"

             echo "Cross-compiling detected. Setting QT_HOST_PATH=$QT_HOST_PATH"
             EXTRA_CMAKE_ARGS="-DQT_HOST_PATH=$QT_HOST_PATH -DQT_HOST_PATH_CMAKE_DIR=$QT_HOST_PATH_CMAKE_DIR"
          else
             EXTRA_CMAKE_ARGS=""
          fi

          cmake -B ${{ matrix.build_dir }} \
            --toolchain "$TOOLCHAIN_PATH" \
            -DENABLE_GUI=ON \
            -DUSE_QT6=ON \
            -DENABLE_UPNP=ON \
            -DDEFAULT_UPNP=ON \
            -DENABLE_TESTS=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DDEP_LIB="${DEP_LIB_PATH}" \
            $EXTRA_CMAKE_ARGS \
            ${{ matrix.cmake_args }}

      # 5. Build
      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --parallel $(nproc)

      # 6a. Test (Linux)
      - name: Run Tests (Linux)
        if: contains(matrix.host, 'linux')
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir ${{ matrix.build_dir }} --output-on-failure -j $(nproc)

      # 6b. Test (Windows)
      - name: Run Tests (Windows)
        if: contains(matrix.host, 'mingw')
        env:
          QT_QPA_PLATFORM: offscreen
          WINEDLLOVERRIDES: "mscoree,mshtml="
          # FORCE a 64-bit Wine Prefix.
          # Without this, mixed environments may default to 32-bit, causing "Bad EXE format".
          WINEARCH: win64
        run: |
          # Initialize Wine to prevent timeout/race conditions during tests
          wineboot --init || true
          ctest --test-dir ${{ matrix.build_dir }} --output-on-failure -j $(nproc)

      # 7. Package (Linux Tarball)
      - name: Create Linux Package (TGZ)
        if: contains(matrix.host, 'linux')
        run: |
          # Use CPack to generate .tar.gz (configured in CMakeLists.txt)
          # -B defines the output directory for artifacts
          cpack -G TGZ --config ${{ matrix.build_dir }}/CPackConfig.cmake -B release_packages

      # 8. Package (Windows Only - NSIS)
      - name: Create Windows Installer
        if: contains(matrix.host, 'mingw')
        run: |
          cmake --build ${{ matrix.build_dir }} --target deploy

      # 9. Upload Artifacts
      - name: Upload Artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: gridcoin-${{ matrix.host }}
          path: |
            release_packages/*.tar.gz
            ${{ matrix.build_dir }}/*.exe
          retention-days: 5

  # ----------------------------------------------------------------------
  # JOB 2: macOS Native (Matches CD Release logic except no packaging)
  # ----------------------------------------------------------------------
  macos-native:
    name: macOS Native (Homebrew Qt6)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew update
          brew install qt boost openssl libevent miniupnpc qrencode libzip ccache cmake

      - name: Configure Ccache
        uses: actions/cache@v4
        with:
          path: /Users/runner/Library/Caches/ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: ccache-macos-

      - name: Configure CMake
        run: |
          export CC_LAUNCHER='-DCMAKE_C_COMPILER_LAUNCHER=ccache'
          export CXX_LAUNCHER='-DCMAKE_CXX_COMPILER_LAUNCHER=ccache'

          # Locate Homebrew Keg-Only packages
          QT6_PATH=$(brew --prefix qt)
          OPENSSL_ROOT=$(brew --prefix openssl)

          cmake -B build \
            -DCMAKE_PREFIX_PATH="$QT6_PATH" \
            -DENABLE_GUI=ON \
            -DENABLE_QRENCODE=ON \
            -DENABLE_UPNP=ON \
            -DDEFAULT_UPNP=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_DOCS=OFF \
            -DUSE_QT6=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT" \
            $CC_LAUNCHER \
            $CXX_LAUNCHER

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j $(sysctl -n hw.logicalcpu)

      - name: Package (DMG)
        run: |
          # Generate Disk Image
          cpack -G DragNDrop --config build/CPackConfig.cmake -B release_packages

      - name: Upload Artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: gridcoin-macos-dmg
          path: release_packages/*.dmg
          retention-days: 5

  # ----------------------------------------------------------------------
  # JOB 3: Deploy (GitHub Release) - NEW SECTION
  # ----------------------------------------------------------------------
  deploy:
    name: Create Release
    needs: [depends-builds, macos-native]
    runs-on: ubuntu-latest
    # STRICT GUARD: Only runs if the event is a Tag push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gridcoin-*
          merge-multiple: true
          path: release_assets

      - name: Generate Checksums
        working-directory: release_assets
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          draft: true
          generate_release_notes: true
