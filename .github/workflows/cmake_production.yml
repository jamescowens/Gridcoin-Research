name: CMake Production Builds (Depends)

on:
  push:
    branches: [ "depends_qt6" ]
  pull_request:
    branches: [ "depends_qt6" ]

env:
  # Global settings
  BUILD_TYPE: Release
  USE_CCACHE: true

jobs:
  # ----------------------------------------------------------------------
  # JOB 1: Linux Native (Matches build_targets.sh Target #1)
  # ----------------------------------------------------------------------
  linux-native:
    name: 1. Linux Native (System Qt6)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # Source the script to load the 'install_deps' function
          source ./install_dependencies.sh
          # Call the function explicitly
          install_deps native true

      - name: Configure CMake
        run: |
          cmake -B build \
            -DENABLE_GUI=ON \
            -DENABLE_QRENCODE=ON \
            -DUSE_DBUS=ON \
            -DENABLE_UPNP=ON \
            -DDEFAULT_UPNP=ON \
            -DENABLE_PIE=ON \
            -DENABLE_DOCS=OFF \
            -DENABLE_TESTS=ON \
            -DUSE_QT6=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ----------------------------------------------------------------------
  # JOB 2: Depends Builds (Linux Static & Windows Cross)
  # ----------------------------------------------------------------------
  depends-builds:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Target #2: Linux Static
          - name: 2. Linux Static (Depends)
            host: x86_64-pc-linux-gnu
            build_dir: build_linux_depends
            # Pass specific flags for static linux build
            cmake_args: >
              -DSTATIC_LIBS=ON
              -DCMAKE_CXX_FLAGS="-fPIE"
              -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-Bdynamic"

          # Target #3: Windows Cross-Compile
          - name: 3. Windows Cross-Compile
            host: x86_64-w64-mingw32
            build_dir: build_win64
            # Pass specific flags for Windows cross build
            cmake_args: >
              -DSYSTEM_XXD=ON
              -DCMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/wine
              -DCMAKE_EXE_LINKER_FLAGS="-static"

    steps:
      - uses: actions/checkout@v4

      # 1. Install Host Tools
      - name: Install System Dependencies
        run: |
          # Source the script to load the 'install_deps' function
          source ./install_dependencies.sh
          # Call the function explicitly (Qt6=false because we build it in depends)
          install_deps all false

          # Ensure wine is installed for Windows testing
          if [[ "${{ matrix.host }}" == *"mingw"* ]]; then
             sudo apt-get install -y wine-stable
          fi

      # 2. Cache Depends
      - name: Cache Depends
        id: cache-depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/work
            depends/${{ matrix.host }}
            depends/sdk-sources
          # Cache key based on host + hash of package definitions
          key: depends-${{ matrix.host }}-${{ hashFiles('depends/packages/*', 'depends/Makefile', 'depends/qt.include') }}

      # 3. Build Depends (Only if cache miss)
      - name: Build Depends
        if: steps.cache-depends.outputs.cache-hit != 'true'
        run: |
          cd depends
          make HOST=${{ matrix.host }} -j$(nproc)

      # 4. Configure CMake
      - name: Configure CMake
        run: |
          # Point to the toolchain generated by the depends system
          TOOLCHAIN_PATH=$(pwd)/depends/${{ matrix.host }}/toolchain.cmake

          # Define DEP_LIB explicitly so the CMake "Manual Fix" logic triggers for Linux Static
          DEP_LIB_PATH=$(pwd)/depends/${{ matrix.host }}/lib

          cmake -B ${{ matrix.build_dir }} \
            --toolchain "$TOOLCHAIN_PATH" \
            -DENABLE_GUI=ON \
            -DUSE_QT6=ON \
            -DENABLE_UPNP=ON \
            -DDEFAULT_UPNP=ON \
            -DENABLE_TESTS=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DDEP_LIB="${DEP_LIB_PATH}" \
            ${{ matrix.cmake_args }}

      # 5. Build
      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --parallel $(nproc)

      # 6. Test (Unit Tests via CTest)
      - name: Run Tests
        run: ctest --test-dir ${{ matrix.build_dir }} --output-on-failure

      # 7. Package (Windows Only - NSIS)
      - name: Create Windows Installer
        if: contains(matrix.host, 'mingw')
        run: |
          cmake --build ${{ matrix.build_dir }} --target deploy

      # 8. Upload Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gridcoin-${{ matrix.host }}
          path: |
            ${{ matrix.build_dir }}/src/gridcoinresearchd*
            ${{ matrix.build_dir }}/*.exe

  # ----------------------------------------------------------------------
  # JOB 3: macOS Native (Matches CD Release logic)
  # ----------------------------------------------------------------------
  macos-native:
    name: 4. macOS Native (Homebrew Qt6)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew update
          brew install qt boost openssl libevent miniupnpc qrencode libzip ccache cmake

      - name: Configure Ccache
        uses: actions/cache@v4
        with:
          path: /Users/runner/Library/Caches/ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: ccache-macos-

      - name: Configure CMake
        run: |
          export CC_LAUNCHER='-DCMAKE_C_COMPILER_LAUNCHER=ccache'
          export CXX_LAUNCHER='-DCMAKE_CXX_COMPILER_LAUNCHER=ccache'

          # macOS often needs an explicit hint for OpenSSL if installed via Homebrew (keg-only)
          OPENSSL_ROOT=$(brew --prefix openssl)

          cmake -B build \
            -DENABLE_GUI=ON \
            -DENABLE_QRENCODE=ON \
            -DENABLE_UPNP=ON \
            -DDEFAULT_UPNP=
