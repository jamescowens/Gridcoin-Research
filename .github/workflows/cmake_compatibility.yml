name: CMake Compatibility Builds

on:
  push:
    branches: [ master, development, depends_qt6 ]
  pull_request:

jobs:
  # ----------------------------------------------------------------------
  # JOB 1: Linux Native (build_targets.sh target 1)
  # ----------------------------------------------------------------------
  linux-native:
    name: Linux Native (System Qt6)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # Source the script to load the 'install_deps' function
          source ./install_dependencies.sh
          # Call the function explicitly
          install_deps native true

      - name: Configure CMake
        run: |
          cmake -B build \
            -DENABLE_GUI=ON \
            -DENABLE_QRENCODE=ON \
            -DUSE_DBUS=ON \
            -DENABLE_UPNP=ON \
            -DDEFAULT_UPNP=ON \
            -DENABLE_PIE=ON \
            -DENABLE_DOCS=OFF \
            -DENABLE_TESTS=ON \
            -DUSE_QT6=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j $(nproc)

  # -------------------------------------------------------------------------
  # JOB 2: Linux ARM64 (System Qt6 via QEMU)
  # -------------------------------------------------------------------------
  linux-arm64-system:
    name: Linux ARM64 (System Qt6)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Add ARM64 Architecture
        run: |
          sudo dpkg --add-architecture arm64

          # 1. Ensure Native AMD64 sources have 'universe' and 'multiverse' enabled
          # The base image might have a minimal sources.list
          sudo add-apt-repository -y universe
          sudo add-apt-repository -y multiverse

          # 2. Restrict default sources to amd64 only (Ubuntu 24.04 DEB822 format)
          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources

          # 3. Add ARM64 ports mirror (ALL suites: release, updates, security)
          # We need all of them so libc6:arm64 version matches libc6:amd64 exactly.
          cat <<EOF | sudo tee /etc/apt/sources.list.d/arm64.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe multiverse restricted
          EOF

          sudo apt-get update

      - name: Install ARM64 Toolchain & Qt6
        run: |
          # 1. Clean up conflicts
          sudo apt-get remove -y libcurl4-openssl-dev libcurl4-gnutls-dev libcups2 libcups2t64 || true
          sudo apt-get autoremove -y

          # 2. Install dependencies
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            zipcmp \
            zipmerge \
            ziptool \
            qemu-user-static \
            g++-aarch64-linux-gnu \
            qt6-base-dev:arm64 \
            qt6-charts-dev:arm64 \
            qt6-svg-dev:arm64 \
            qt6-l10n-tools:arm64 \
            qt6-tools-dev:arm64 \
            qt6-tools-dev-tools:arm64 \
            libqt6core5compat6-dev:arm64 \
            libssl-dev:arm64 \
            libzip-dev:arm64 \
            libcurl4-openssl-dev:arm64 \
            libboost-system-dev:arm64 \
            libboost-filesystem-dev:arm64 \
            libboost-thread-dev:arm64 \
            libboost-iostreams-dev:arm64 \
            libboost-program-options-dev:arm64 \
            libboost-serialization-dev:arm64 \
            libboost-chrono-dev:arm64 \
            libboost-test-dev:arm64 \
            libminiupnpc-dev:arm64 \
            libqrencode-dev:arm64 \
            libxkbcommon-dev:arm64

      - name: Configure CMake (Cross)
        run: |
          cmake -B build -GNinja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH="/usr/lib/aarch64-linux-gnu;/usr/include/aarch64-linux-gnu" \
            -DCMAKE_SYSROOT=/ \
            -DENABLE_GUI=ON \
            -DUSE_QT6=ON \
            -DQt6_DIR=/usr/lib/aarch64-linux-gnu/cmake/Qt6 \
            -DENABLE_TESTS=ON \
            -DCMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/qemu-aarch64-static

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test (QEMU Emulation)
        env:
          # Force Qt to run in "Headless" mode so it doesn't look for a screen
          QT_QPA_PLATFORM: offscreen
          # Optional: Make QEMU explicit about library paths if it gets confused
          # (Ubuntu Multiarch usually handles this automatically, but keeping this in mind)
          # QEMU_LD_PREFIX: /usr/aarch64-linux-gnu
        run: |
          # Run tests with verbose output on failure
          ctest --test-dir build --output-on-failure -j $(nproc)

  # -------------------------------------------------------------------------
  # JOB 3: Linux ARMhf (32-bit ARMv7 / Odroid)
  # -------------------------------------------------------------------------
  linux-armhf-system:
    name: Linux ARMhf (System Qt6)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v7

      - name: Add ARMhf Architecture
        run: |
          sudo dpkg --add-architecture armhf

          # 1. Enable Native AMD64 universe/multiverse (Critical for dependency resolution)
          sudo add-apt-repository -y universe
          sudo add-apt-repository -y multiverse

          # 2. Restrict default sources to amd64
          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources

          # 3. Add ARMhf ports mirror
          # Note: ports.ubuntu.com hosts both arm64 and armhf
          cat <<EOF | sudo tee /etc/apt/sources.list.d/armhf.list
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble main universe multiverse restricted
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe multiverse restricted
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-security main universe multiverse restricted
          EOF

          sudo apt-get update

      - name: Install ARMhf Toolchain & Qt6
        run: |
          # 1. Clean up conflicts (The "Pure Foreign" Strategy)
          # We purposefully remove native libs that conflict with multiarch
          sudo dpkg --remove --force-all libcurl4-openssl-dev libcurl4-gnutls-dev libcups2 libcups2t64 || true
          sudo apt-get update
          sudo apt-get -f install -y

          # 2. Install dependencies (Pure ARMhf for Qt/Boost)
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            zipcmp \
            zipmerge \
            ziptool \
            qemu-user-static \
            g++-arm-linux-gnueabihf \
            qt6-base-dev:armhf \
            qt6-charts-dev:armhf \
            qt6-svg-dev:armhf \
            qt6-l10n-tools:armhf \
            qt6-tools-dev:armhf \
            qt6-tools-dev-tools:armhf \
            libqt6core5compat6-dev:armhf \
            libssl-dev:armhf \
            libzip-dev:armhf \
            libcurl4-openssl-dev:armhf \
            libboost-system-dev:armhf \
            libboost-filesystem-dev:armhf \
            libboost-thread-dev:armhf \
            libboost-iostreams-dev:armhf \
            libboost-program-options-dev:armhf \
            libboost-serialization-dev:armhf \
            libboost-chrono-dev:armhf \
            libboost-test-dev:armhf \
            libminiupnpc-dev:armhf \
            libqrencode-dev:armhf \
            libxkbcommon-dev:armhf

      - name: Configure CMake (Cross)
        run: |
          cmake -B build -GNinja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=arm \
            -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
            -DCMAKE_FIND_ROOT_PATH="/usr/lib/arm-linux-gnueabihf;/usr/include/arm-linux-gnueabihf" \
            -DCMAKE_SYSROOT=/ \
            -DQt6_DIR=/usr/lib/arm-linux-gnueabihf/cmake/Qt6 \
            -DENABLE_TESTS=ON \
            -DENABLE_GUI=ON \
            -DUSE_QT6=ON \
            -DCMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/qemu-arm-static

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test (QEMU Emulation)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ctest --test-dir build --output-on-failure -j $(nproc)
